services:
  web-service:
    depends_on:
      
model-service
  image: ghcr.io/kethehar/djl-serving-consumer:latest
  ports:
[cite_start]"80:8082" # Der Consumer läuft intern auf 8082 [cite: 742]
restart: always

  model-service:
    image: ghcr.io/kethehar/djl-serving:latest
    restart: always
    environment:
      
SERVING_RESERVED_MEMORY_MB=64
SERVING_REQUIRED_MEMORY_MB=64
SERVING_MIN_WORKERS=1
SERVING_MAX_WORKERS=1
JAVA_OPTS=-Xms64m -Xmx256m